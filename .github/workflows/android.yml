name: Android PR Fast Path

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  actions: write

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  android-pr-check:
    name: android-pr-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: false
          cache-read-only: ${{ github.event.pull_request.head.repo.fork }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup google-services.json
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is required for Android build."
            exit 1
          fi
          mkdir -p app
          printf "%s" "$GOOGLE_SERVICES_JSON" > app/google-services.json
          test -s app/google-services.json

      - name: Verify Google Maps API key
        run: |
          if [ -z "${GOOGLE_MAPS_API_KEY:-}" ]; then
            echo "::error::GOOGLE_MAPS_API_KEY secret is required for Android build."
            exit 1
          fi

      - name: Unit Tests (PR fast path)
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

  android-lint:
    name: android-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: false
          cache-read-only: ${{ github.event.pull_request.head.repo.fork }}

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup google-services.json
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is required for Android build."
            exit 1
          fi
          mkdir -p app
          printf "%s" "$GOOGLE_SERVICES_JSON" > app/google-services.json
          test -s app/google-services.json

      - name: Verify Google Maps API key
        run: |
          if [ -z "${GOOGLE_MAPS_API_KEY:-}" ]; then
            echo "::error::GOOGLE_MAPS_API_KEY secret is required for Android build."
            exit 1
          fi

      - name: Lint Debug
        run: ./gradlew lintDebug --no-daemon --stacktrace

      - name: Upload Lint Reports
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: lint-debug-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt
          if-no-files-found: warn
