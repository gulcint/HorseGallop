name: Android CI + Firebase Test Lab

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      FTL_RESULTS_BUCKET: ${{ secrets.FTL_RESULTS_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup google-services.json
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is required for Android build."
            exit 1
          fi
          mkdir -p app
          printf "%s" "$GOOGLE_SERVICES_JSON" > app/google-services.json
          test -s app/google-services.json && echo "google-services.json written" || (echo "google-services.json missing" && exit 1)

      - name: Verify Google Maps API key
        run: |
          if [ -z "${GOOGLE_MAPS_API_KEY:-}" ]; then
            echo "::error::GOOGLE_MAPS_API_KEY secret is required for Android build."
            exit 1
          fi

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Run Firebase Test Lab (Robo Test)
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' }}
        id: ftl
        run: |
          set -euo pipefail
          PROJECT_NUMBER="$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectNumber)')"
          RESULTS_BUCKET="${FTL_RESULTS_BUCKET:-test-lab-${PROJECT_NUMBER}}"
          RESULTS_DIR="github-actions/${{ github.repository }}/${{ github.run_id }}-${{ github.run_attempt }}"
          echo "results_bucket=${RESULTS_BUCKET}" >> "${GITHUB_OUTPUT}"
          echo "results_dir=${RESULTS_DIR}" >> "${GITHUB_OUTPUT}"

          gcloud firebase test android run \
            --type robo \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --device model=Pixel6,version=34,locale=en,orientation=portrait \
            --timeout 300s \
            --record-video \
            --performance-metrics \
            --results-bucket "gs://${RESULTS_BUCKET}" \
            --results-dir "${RESULTS_DIR}"

      - name: Download Firebase Test Lab Results
        if: ${{ always() && steps.ftl.outputs.results_bucket != '' && steps.ftl.outputs.results_dir != '' }}
        run: |
          set -euo pipefail
          mkdir -p firebase_test_results
          gsutil -m cp -r \
            "gs://${{ steps.ftl.outputs.results_bucket }}/${{ steps.ftl.outputs.results_dir }}" \
            firebase_test_results || true

      - name: Upload Test Results
        if: ${{ always() && steps.ftl.outputs.results_bucket != '' && steps.ftl.outputs.results_dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          path: firebase_test_results
          if-no-files-found: warn

      - name: Publish Firebase Test Lab Links
        if: ${{ always() && steps.ftl.outputs.results_bucket != '' && steps.ftl.outputs.results_dir != '' }}
        run: |
          {
            echo "## Firebase Test Lab"
            echo ""
            echo "- Console: https://console.firebase.google.com/project/${{ env.GCP_PROJECT_ID }}/testlab/histories"
            echo "- GCS Path: gs://${{ steps.ftl.outputs.results_bucket }}/${{ steps.ftl.outputs.results_dir }}"
          } >> "${GITHUB_STEP_SUMMARY}"
