name: Android CI + Firebase Test Lab

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      FTL_RESULTS_BUCKET: ${{ secrets.FTL_RESULTS_BUCKET }}
      FTL_MODEL_ID: oriole
      FTL_VERSION_ID: "33"
      FTL_LOCALE: en
      FTL_ORIENTATION: portrait

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup google-services.json
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is required for Android build."
            exit 1
          fi
          mkdir -p app
          printf "%s" "$GOOGLE_SERVICES_JSON" > app/google-services.json
          test -s app/google-services.json && echo "google-services.json written" || (echo "google-services.json missing" && exit 1)

      - name: Verify Google Maps API key
        run: |
          if [ -z "${GOOGLE_MAPS_API_KEY:-}" ]; then
            echo "::error::GOOGLE_MAPS_API_KEY secret is required for Android build."
            exit 1
          fi

      - name: Build Debug APK + Unit Tests + Lint
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Authenticate to Google Cloud
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Check Firebase Test Lab API readiness
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' }}
        id: ftl_precheck
        run: |
          set -euo pipefail
          REQUIRED_SERVICES=("firebase.googleapis.com" "testing.googleapis.com" "toolresults.googleapis.com")

          if ! ENABLED_SERVICES="$(gcloud services list --enabled --project "${GCP_PROJECT_ID}" --format='value(config.name)' 2>/tmp/ftl-precheck-services.err)"; then
            echo "::warning::Skipping Firebase Test Lab because the CI service account cannot list enabled APIs for project ${GCP_PROJECT_ID}."
            {
              echo "### Firebase Test Lab skipped"
              echo ""
              echo "Reason: CI service account cannot list enabled APIs."
              echo ""
              echo "Grant Service Usage Consumer (roles/serviceusage.serviceUsageConsumer)"
              echo "or enable required APIs with a higher-privilege account."
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          MISSING_SERVICES=()
          for SERVICE in "${REQUIRED_SERVICES[@]}"; do
            if ! grep -qx "${SERVICE}" <<< "${ENABLED_SERVICES}"; then
              MISSING_SERVICES+=("${SERVICE}")
            fi
          done

          if [ "${#MISSING_SERVICES[@]}" -gt 0 ]; then
            MISSING_CSV="$(IFS=,; echo "${MISSING_SERVICES[*]}")"
            echo "::warning::Skipping Firebase Test Lab because required APIs are disabled: ${MISSING_CSV}"
            {
              echo "### Firebase Test Lab skipped"
              echo ""
              echo "Missing APIs: ${MISSING_CSV}"
              echo "Enable these APIs in Google Cloud, then rerun this workflow."
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate Firebase Test Lab device config
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' && steps.ftl_precheck.outputs.ready == 'true' }}
        run: |
          set -euo pipefail
          MODEL_FOUND="$(gcloud firebase test android models list --format='value(id)' | grep -x "${FTL_MODEL_ID}" || true)"
          if [ -z "${MODEL_FOUND}" ]; then
            echo "::error::Invalid FTL model id '${FTL_MODEL_ID}'. Use a valid id from 'gcloud firebase test android models list'."
            exit 1
          fi

          SUPPORTED_VERSIONS="$(gcloud firebase test android models describe "${FTL_MODEL_ID}" --format='value(supportedVersionIds)')"
          if [[ "${SUPPORTED_VERSIONS}" != *"${FTL_VERSION_ID}"* ]]; then
            echo "::error::Model '${FTL_MODEL_ID}' does not support Android version '${FTL_VERSION_ID}'. Supported: ${SUPPORTED_VERSIONS}"
            exit 1
          fi

          echo "Using FTL device: model=${FTL_MODEL_ID},version=${FTL_VERSION_ID},locale=${FTL_LOCALE},orientation=${FTL_ORIENTATION}"

      - name: Run Firebase Test Lab (Robo Test)
        if: ${{ env.GCP_SA_KEY != '' && env.GCP_PROJECT_ID != '' && steps.ftl_precheck.outputs.ready == 'true' }}
        id: ftl
        run: |
          set -euo pipefail
          PROJECT_NUMBER="$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectNumber)')"
          RESULTS_BUCKET="${FTL_RESULTS_BUCKET:-test-lab-${PROJECT_NUMBER}}"
          RESULTS_DIR="github-actions/${{ github.repository }}/${{ github.run_id }}-${{ github.run_attempt }}"
          echo "results_bucket=${RESULTS_BUCKET}" >> "${GITHUB_OUTPUT}"
          echo "results_dir=${RESULTS_DIR}" >> "${GITHUB_OUTPUT}"

          gcloud firebase test android run \
            --type robo \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --device model="${FTL_MODEL_ID}",version="${FTL_VERSION_ID}",locale="${FTL_LOCALE}",orientation="${FTL_ORIENTATION}" \
            --timeout 300s \
            --record-video \
            --performance-metrics \
            --results-bucket "gs://${RESULTS_BUCKET}" \
            --results-dir "${RESULTS_DIR}"

      - name: Download Firebase Test Lab Results
        if: ${{ always() && steps.ftl_precheck.outputs.ready == 'true' && steps.ftl.outputs.results_bucket != '' && steps.ftl.outputs.results_dir != '' }}
        run: |
          set -euo pipefail
          mkdir -p firebase_test_results
          gsutil -m cp -r \
            "gs://${{ steps.ftl.outputs.results_bucket }}/${{ steps.ftl.outputs.results_dir }}" \
            firebase_test_results || true

      - name: Upload Test Results
        if: ${{ always() && steps.ftl_precheck.outputs.ready == 'true' && steps.ftl.outputs.results_bucket != '' && steps.ftl.outputs.results_dir != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          path: firebase_test_results
          if-no-files-found: warn

      - name: Publish Firebase Test Lab Links
        if: ${{ always() && steps.ftl_precheck.outputs.ready == 'true' && steps.ftl.outputs.results_bucket != '' && steps.ftl.outputs.results_dir != '' }}
        run: |
          {
            echo "## Firebase Test Lab"
            echo ""
            echo "- Console: https://console.firebase.google.com/project/${{ env.GCP_PROJECT_ID }}/testlab/histories"
            echo "- GCS Path: gs://${{ steps.ftl.outputs.results_bucket }}/${{ steps.ftl.outputs.results_dir }}"
          } >> "${GITHUB_STEP_SUMMARY}"
