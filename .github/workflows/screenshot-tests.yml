name: Screenshot Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  screenshot-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Run screenshot tests
        run: ./gradlew verifyPaparazziDebug --stacktrace
      
      - name: Record screenshots
        if: failure()
        run: ./gradlew recordPaparazziDebug
      
      - name: Upload screenshot test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-test-results
          path: |
            **/build/reports/paparazzi/
            **/src/test/snapshots/
          retention-days: 30
      
      - name: Comment PR with screenshot diff
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Screenshot tests failed! Please review the differences in the artifacts.'
            })
