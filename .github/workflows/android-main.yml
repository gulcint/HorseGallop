name: Android Main Gate

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-main-gate:
    name: android-main-gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
          cache-disabled: false
          cache-read-only: false

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup google-services.json
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is required for Android build."
            exit 1
          fi
          mkdir -p app
          printf "%s" "$GOOGLE_SERVICES_JSON" > app/google-services.json
          test -s app/google-services.json

      - name: Verify Google Maps API key
        run: |
          if [ -z "${GOOGLE_MAPS_API_KEY:-}" ]; then
            echo "::error::GOOGLE_MAPS_API_KEY secret is required for Android build."
            exit 1
          fi

      - name: Android gate
        run: ./gradlew lintDebug testDebugUnitTest assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Lint Reports
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: lint-debug-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt
          if-no-files-found: warn

  backend-check:
    name: backend-check
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend build
        working-directory: backend
        run: npm run build
